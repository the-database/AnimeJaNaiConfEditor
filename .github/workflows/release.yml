name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version'
        required: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write  # required for ncipollo/release-action to create the release

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'  # Must match <TargetFramework> in AnimeJaNaiConfEditor.csproj

    - name: Publish self-contained single-file win-x64
      # Publish directly (not via FolderProfile.pubxml, which sets SelfContained=false).
      run: dotnet publish AnimeJaNaiConfEditor/AnimeJaNaiConfEditor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

    - name: Stage runtime files only
      # Keep just the executable and the native Avalonia DLLs (Skia/HarfBuzz/ANGLE).
      # Exclude animejanai.conf, onnx/, and *.pdb - the conf and models are owned by the
      # mpv-upscale-2x_animejanai overlay and must not ship in this artifact.
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path staging | Out-Null
        Copy-Item publish\*.exe staging\
        Copy-Item publish\*.dll staging\

    - name: Create zip archive
      shell: pwsh
      run: Compress-Archive -Path staging\* -DestinationPath AnimeJaNaiConfEditor-portable-x64.zip -Force

    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.event.inputs.release_version }}
        name: ${{ github.event.inputs.release_version }}
        draft: true
        prerelease: false
        artifacts: AnimeJaNaiConfEditor-portable-x64.zip
        token: ${{ secrets.GITHUB_TOKEN }}
